name: Style Check

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    checkstyle:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Java 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"
                  cache: gradle

            - name: Ensure Gradle wrapper is executable
              run: chmod +x ./gradlew

            - name: Run Checkstyle on main sources
              run: ./gradlew checkstyleMain --no-daemon

            - name: Run Checkstyle on test sources
              run: ./gradlew checkstyleTest --no-daemon
